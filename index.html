<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* 简单的页面美化样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            color: #24292e;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #586069;
            font-size: 1.2rem;
        }
        .card {
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <h1>Hello! 👋</h1>
    <p>欢迎来到我的 GitHub Pages 个人网站。</p>

    <div class="card">
        <h3>关于我</h3>
        <p>这是我的第一个网页，未来我会在这里分享更多内容，敬请期待！</p>
    </div>

</body>
</html>
